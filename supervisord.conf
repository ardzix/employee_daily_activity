[supervisord]
nodaemon=true

[program:uwsgi]
; Larger than default 4096: SSO + public cookies (arna_sso_*) can exceed limit and cause
; "invalid request block size" / upstream closed connection -> nginx 502 on e.g. POST /activities/api/check-out/
command=uwsgi --http :8001 --module employee_activity_tracker.wsgi:application --static-map /static=/usr/src/app/static --master --processes 4 --threads 2 --buffer-size 65536 --http-buffer-size 65536
directory=/usr/src/app
autostart=true
autorestart=true
stdout_logfile=/var/log/uwsgi.log
stderr_logfile=/var/log/uwsgi.err