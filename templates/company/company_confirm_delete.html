{% extends 'base.html' %}

{% block title %}Delete Company{% endblock %}

{% block content %}
<div style="max-width:600px;margin:0 auto;padding:32px 24px;">
    <h1 class="page-title" style="color:var(--ant-error);margin-bottom:24px;"><i class="fas fa-exclamation-triangle" style="margin-right:8px;"></i>Delete Company</h1>

    <div class="ant-card">
        <div class="ant-card-body">
            <p style="font-size:16px;font-weight:600;color:var(--text-heading);margin:0 0 16px;">Are you sure?</p>

            <div style="padding:14px 16px;background:var(--ant-error-bg);border-radius:6px;border:1px solid var(--ant-error);margin-bottom:16px;">
                <p style="margin:0;color:var(--text-color);font-size:14px;">
                    You are about to delete the company <strong style="color:var(--text-heading);">{{ object.name }}</strong>.
                    <br><span style="color:var(--ant-error);font-size:13px;font-weight:600;">This action cannot be undone.</span>
                </p>
            </div>

            <hr class="ant-divider">
            <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:16px;">
                <a href="{% url 'employee:company_list' %}" class="ant-btn ant-btn-default">Cancel</a>
                <form method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="ant-btn ant-btn-danger"><i class="fas fa-trash"></i> Delete Company</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
